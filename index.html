<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfriDeal Motors - Occasions Fiables à Prix Imbattables</title>
    <style>
        /* CSS Simple pour commencer */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
        }
        h1 {
            color: #d9534f; /* Un rouge dynamique pour Motors */
        }
        .slogan {
            font-size: 1.2em;
            color: #555;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #f0ad4e; /* Un jaune/or pour Deal */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        /* Style pour ton logo (plus tard) */
        .logo-placeholder {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }
        .logo-placeholder span:first-child { color: #f0ad4e; } /* AfriDeal */
        .logo-placeholder span:last-child { color: #d9534f; } /* Motors */
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-placeholder"><span>AfriDeal</span><span> Motors</span></div>
        
        <h1>Bienvenue chez AfriDeal Motors</h1>
        <p class="slogan">Des occasions fiables à prix imbattables, importées directement pour vous.</p>
        
        <p>Notre site est en construction. Bientôt, vous pourrez découvrir notre inventaire de véhicules reconditionnés.</p>
        
        <a href="mailto:contact@afridealmotors.com" class="btn">Nous Contacter</a>
    </div>

</body>
</html>
